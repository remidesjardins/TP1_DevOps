# Pipeline en étapes (jobs) alignée sur le Dockerfile multi-stage :
#
#   CI-1 · Build Maven          → compile + package rapide (hôte), échec immédiat si le code ne compile pas.
#   CI-2 · Docker stage `build` → même étape que "FROM … AS build" : mvn verify + JaCoCo dans l’image.
#   CI-3 · Qualité              → Sonar + Codecov à partir du target/ exporté depuis l’image (sans re-lancer verify).
#   CI-4 · Image runtime        → build final avec SKIP_TESTS=true (repackage seul, cache Docker).
#
# Dockerfile : stage `build` = tests ; image finale = ARG SKIP_TESTS=true en CI.
#
# GitHub : Secrets SONAR_TOKEN | Variables SONAR_ORGANIZATION, SONAR_PROJECT_KEY
# Codecov : secret CODECOV_TOKEN (app.codecov.io → dépôt → Settings → upload token).
#           L’upload OIDC peut produire une URL slug invalide (owner::::repo) et des 500 ; le token est plus fiable.
#
# Analyse Sonar/Codecov « tout le dépôt » sur main : voir .github/workflows/analyse-main.yml (ce workflow
# n’exécute pas CI-3 sur un push vers main pour éviter un double envoi Sonar).

name: CI DevOps

on:
  push:
    branches: [ "main", "newcarservice", "feature/**" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_BUILDKIT: 1

jobs:
  # ---------------------------------------------------------------------------
  # CI-1 — Équivalent "compile / package" avant tout job coûteux (Docker, Sonar).
  # ---------------------------------------------------------------------------
  stage-host-build:
    name: "CI-1 · Build (Maven)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Rendre le wrapper Maven exécutable
        run: chmod +x mvnw

      - name: Compiler et packager (sans tests)
        run: ./mvnw -B clean package -DskipTests

  # ---------------------------------------------------------------------------
  # CI-2 — Miroir exact du stage Docker `build` : tests + JaCoCo + JAR dans l’image.
  # ---------------------------------------------------------------------------
  stage-docker-build:
    name: "CI-2 · Tests (Dockerfile → stage build)"
    needs: stage-host-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Construire l’étape Docker build (mvn verify dans l’image)
        run: docker build --target build -t tp1-devops:build-ci .

      - name: Exporter target/ depuis le conteneur (Sonar + rapport HTML)
        run: |
          cid=$(docker create tp1-devops:build-ci)
          mkdir -p export
          docker cp "$cid:/app/target" export/
          docker rm "$cid"

      - name: Artifact — rapport JaCoCo (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: export/target/site/jacoco

      - name: Artifact — target/ (classes + jacoco.xml, sans fat JAR)
        uses: actions/upload-artifact@v4
        with:
          name: maven-target
          path: export/target
          if-no-files-found: error
          exclude: |
            **/*-SNAPSHOT.jar
            **/*.jar.original

  # ---------------------------------------------------------------------------
  # CI-3 — Sonar + Codecov : réutilise le même target/ que l’étape Docker (pas de 2e verify).
  # ---------------------------------------------------------------------------
  stage-quality:
    name: "CI-3 · Qualité (SonarCloud + Codecov)"
    needs: stage-docker-build
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Télécharger target/ (binaire + JaCoCo depuis l’image)
        uses: actions/download-artifact@v4
        with:
          name: maven-target
          path: target

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Rendre le wrapper Maven exécutable
        run: chmod +x mvnw

      - name: Vérifier la configuration SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "::error::Secret SONAR_TOKEN manquant (SonarCloud → profil → Security)."
            exit 1
          fi
          if [ -z "${SONAR_ORGANIZATION}" ] || [ -z "${SONAR_PROJECT_KEY}" ]; then
            echo "::error::Variables SONAR_ORGANIZATION et SONAR_PROJECT_KEY manquantes."
            exit 1
          fi

      - name: Analyse SonarCloud (sans re-exécuter les tests)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          ./mvnw -B -DskipTests sonar:sonar
          -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}

      - name: Vérifier le secret Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -z "${CODECOV_TOKEN}" ]; then
            echo "::error::Secret CODECOV_TOKEN manquant (Codecov → dépôt → Settings → upload token ; GitHub → Settings → Secrets and variables → Actions)."
            exit 1
          fi

      - name: Envoyer la couverture à Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: true

  # ---------------------------------------------------------------------------
  # CI-4 — Image finale = 2e étape du Dockerfile ; SKIP_TESTS=true (déjà validé en CI-2).
  # ---------------------------------------------------------------------------
  stage-docker-runtime:
    name: "CI-4 · Image (Dockerfile → runtime)"
    runs-on: ubuntu-latest
    needs: [stage-host-build, stage-docker-build, stage-quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Construire l’image runtime (repackage dans le stage build, sans tests)
        run: docker build --build-arg SKIP_TESTS=true -t tp1-devops:ci .
