name: CI DevOps

on:
  push:
    branches: [ "main", "newcarservice", "feature/**" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_BUILDKIT: 1

jobs:
  # Bloc 1 — compile, tests (mvn verify dans Docker), rapport JaCoCo
  tests-and-coverage:
    name: Tests & couverture (JaCoCo)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image (étape Maven) et extraire le rapport JaCoCo
        run: |
          docker build --target build -t tp1-devops:build-ci .
          cid=$(docker create tp1-devops:build-ci)
          docker cp "$cid:/app/target/site/jacoco" ./jacoco-report
          docker rm "$cid"

      - name: Publier le rapport JaCoCo (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: jacoco-report

  # Bloc 2 — image runtime (après succès des tests)
  docker-image:
    name: Image Docker (runtime)
    runs-on: ubuntu-latest
    needs: tests-and-coverage
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Construire l’image finale
        run: docker build -t tp1-devops:ci .
